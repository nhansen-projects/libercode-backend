services:
  db-dev:
    profiles: ["dev"]
    image: postgres:15
    command: postgres -c "authentication_timeout=120"
    env_file:
      - .env.dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  web-dev:
    profiles: ["dev"]
    build: .
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      db-dev:
        condition: service_healthy
    restart: unless-stopped

  db-prod:
    profiles: ["prod"]
    image: postgres:15
    command: postgres -c "authentication_timeout=120"
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  web-prod:
    profiles: ["prod"]
    build: .
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8080:8000"
    env_file:
      - .env.prod
    depends_on:
      db-prod:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
  postgres_prod_data:
