services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: notesDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notesDB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn libercode.wsgi:application --bind 0.0.0.0:8080 --workers 3 --access-logfile -"
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=notesDB
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DEBUG=0
      - SECURE_SSL_REDIRECT=0
      - SECRET_KEY=njjkpSDk$$3OUXNf!A7#53OD7MbHKBgQITGZhMrYDj0DyP$$zcJC
      - JWT_SIGNING_KEY=6bb3ac489638886394c48f4d7292f34a97dba2fa96f90b082cdcfdfc59904be5
      - ALLOWED_HOSTS=localhost,127.0.0.1,libercode.augustdev.work,187.77.88.100
      - CORS_ALLOWED_ORIGINS=https://libercode.augustdev.work,http://libercode.augustdev.work:8090,https://libercode.augustdev.work:8090,http://187.77.88.100:8090,https://187.77.88.100:8090,http://localhost:8090,http://127.0.0.1:8090,https://localhost:8090,https://127.0.0.1:8090
      - CSRF_TRUSTED_ORIGINS=https://libercode.augustdev.work,http://libercode.augustdev.work:8090,https://libercode.augustdev.work:8090,http://187.77.88.100:8090,https://187.77.88.100:8090,http://localhost:8090,http://127.0.0.1:8090,https://localhost:8090,https://127.0.0.1:8090
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
